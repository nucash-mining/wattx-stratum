syntax = "proto3";
package protowire;

// Minimal Kaspa gRPC proto for mining — GetBlockTemplate + SubmitBlock only.
// Field numbers must match kaspad exactly (kaspanet/kaspad rpc.proto).

service RPC {
  rpc GetBlockTemplate(GetBlockTemplateRequestMessage) returns (GetBlockTemplateResponseMessage) {}
  rpc SubmitBlock(SubmitBlockRequestMessage) returns (SubmitBlockResponseMessage) {}
}

message RPCError { string message = 1; }

// ---- GetBlockTemplate --------------------------------------------------------

message GetBlockTemplateRequestMessage {
  string payAddress = 1;
  string extraData  = 2;
}

message GetBlockTemplateResponseMessage {
  RPCError error    = 1000;
  RpcBlock block    = 3;
  bool     isSynced = 2;
}

// ---- SubmitBlock -------------------------------------------------------------

message SubmitBlockRequestMessage {
  RpcBlock block              = 1;
  bool     allowNonDAABlocks  = 3;
}

message SubmitBlockResponseMessage {
  enum RejectReason { NONE = 0; BLOCK_INVALID = 1; IS_IN_IBD = 2; }
  RPCError     error        = 1000;
  RejectReason rejectReason = 1;
}

// ---- Block / Header ----------------------------------------------------------

message RpcBlockLevelParents { repeated string parentHashes = 1; }

message RpcBlockHeader {
  uint32                     version              = 1;
  repeated RpcBlockLevelParents parents            = 2;
  string                     hashMerkleRoot       = 3;
  string                     acceptedIdMerkleRoot = 4;
  string                     utxoCommitment       = 5;
  int64                      timestamp            = 6;
  uint32                     bits                 = 7;
  uint64                     nonce                = 8;
  uint64                     daaScore             = 9;
  string                     blueWork             = 10;
  string                     pruningPoint         = 11;
  uint64                     blueScore            = 12;
}

message RpcBlock {
  RpcBlockHeader             header       = 1;
  repeated RpcTransaction    transactions = 2;
  RpcBlockVerboseData        verboseData  = 3;
}

message RpcBlockVerboseData {
  string hash                    = 1;
  double difficulty              = 11;
  string selectedParentHash      = 12;
  repeated string transactionIds = 14;
  bool   isHeaderOnly            = 15;
  uint64 blueScore               = 16;
  repeated string childrenHashes = 17;
  repeated string mergeSetBluesHashes = 18;
  repeated string mergeSetRedsHashes  = 19;
  bool   isChainBlock            = 20;
}

// ---- Transactions ------------------------------------------------------------

message RpcOutpoint { string transactionId = 1; uint32 index = 2; }

message RpcScriptPublicKey { uint32 version = 1; string scriptPublicKey = 2; }

message RpcTransactionInput {
  RpcOutpoint                       previousOutpoint = 1;
  string                            signatureScript  = 2;
  uint64                            sequence         = 3;
  uint32                            sigOpCount       = 4;
  RpcTransactionInputVerboseData    verboseData      = 5;
}

message RpcTransactionOutput {
  uint64                            amount          = 1;
  RpcScriptPublicKey                scriptPublicKey = 2;
  RpcTransactionOutputVerboseData   verboseData     = 3;
}

message RpcTransaction {
  uint32                       version      = 1;
  repeated RpcTransactionInput inputs       = 2;
  repeated RpcTransactionOutput outputs     = 3;
  uint64                       lockTime     = 4;
  string                       subnetworkId = 5;
  uint64                       gas          = 6;
  string                       payload      = 7;
  RpcTransactionVerboseData    verboseData  = 8;
}

message RpcTransactionVerboseData {
  string transactionId = 1;
  double computeMass   = 2;
}

message RpcTransactionInputVerboseData {}
message RpcTransactionOutputVerboseData {}
